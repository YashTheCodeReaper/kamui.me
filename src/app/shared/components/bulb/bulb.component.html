<div class="bulb-container">
  <div class="wire"></div>
  <div class="connector">
    <div class="grove"></div>
    <div class="grove"></div>
    <div class="grove"></div>
  </div>
  <div
    #bulbEl
    class="bulb"
    role="button"
    [attr.aria-pressed]="isOn()"
    [ngClass]="{ active: isOn(), inactive: !isOn() }"
    (click)="toggle()"
  >
    <div class="metal-wire"></div>
    <div class="metal-wire"></div>
    <div class="metal-wire"></div>
  </div>
</div>
