<section class="quote_section">
  <h1 class="ff_nhg">
    @for (line of quote.headline; track $index; let last = $last) {
      {{ line }}@if (!last) {<br />}
    }
  </h1>
  <h1 class="ff_tp col">{{ quote.attribution }}</h1>
  <p class="ff_mb">
    {{ quote.aside.intro }}<br />
    <span class="ff_mbb">{{ quote.aside.punchline }}</span>
  </p>
</section>
