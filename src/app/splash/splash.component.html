<section class="splash_section">
  <div class="jail" style="--ssjscale: 1.5">
    <div class="bar" style="--ssjbari: 1; --ssjbaril: 1">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 2; --ssjbaril: 2">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 3; --ssjbaril: 3">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 4; --ssjbaril: 4">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 5; --ssjbaril: 5">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 4; --ssjbaril: 6">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 3; --ssjbaril: 7">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 2; --ssjbaril: 8">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
    <div class="bar" style="--ssjbari: 1; --ssjbaril: 9">
      <div class="bar_enc bar_enc1"></div>
      <div class="bar_enc bar_enc2"></div>
    </div>
  </div>
  <div class="progress_bar_track">
    <div
      class="progress_bar"
      [style.--pb]="progressPercent()"
    ></div>
  </div>

  <div class="cache_info ff_mb">
    <div class="cache_info__phase">
      <span class="cache_info__dot"></span>
      <span>{{ phaseLabel() }}</span>
      @if (counterLabel()) {
        <span class="cache_info__counter">{{ counterLabel() }}</span>
      }
    </div>
    @if (currentAssetName()) {
      <div class="cache_info__path" [title]="status().current ?? ''">
        {{ currentAssetName() }}
        @if (currentSizeLabel()) {
          <span class="cache_info__size">· {{ currentSizeLabel() }}</span>
        }
      </div>
    }
  </div>
</section>
