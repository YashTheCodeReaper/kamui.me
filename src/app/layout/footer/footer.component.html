<footer class="footer">
  <img src="assets/images/footer/samurai_footer.svg" alt="" aria-hidden="true" />

  <div class="footer_top">
    <div class="ft_left ff_mb">
      <h4 appTextReveal>{{ pitch }}</h4>
      <app-button
        text="Get In Touch"
        textColor="var(--main-1)"
        arrowColor="var(--main-1)"
        (clicked)="onContactClick()"
      ></app-button>
    </div>

    <div class="ff_right">
      <nav class="ffr_left ff_nhg" aria-label="Footer">
        @for (link of navLinks; track link.label) {
          <h4>
            <span>{{ accent(link.label) }}</span>{{ rest(link.label) }}
          </h4>
        }
      </nav>

      <div class="ffr_right ff_mb">
        @for (contact of contacts; track contact.value) {
          <div class="ffrr_box">
            <p>{{ contact.intro }}</p>
            @if (contact.href) {
              <a [href]="contact.href"><h4>{{ contact.value }}</h4></a>
            } @else {
              <h4>{{ contact.value }}</h4>
            }
          </div>
        }
      </div>
    </div>
  </div>

  <div class="footer_extra ff_mb">
    <h4>{{ copyright }}</h4>
    <h4>Linked In</h4>
  </div>

  <div class="kamui_foot">
    <h1 class="ff_gr"><span>K</span>AMUI.<span>ME</span></h1>
  </div>
</footer>
