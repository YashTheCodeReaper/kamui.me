    <!-- Performance hints — preconnect/dns-prefetch the icon CDN so its
         CSS request handshake is already warm by the time the deferred
         Angular bundle requests it. -->
    <link rel="preconnect" href="https://cdn-uicons.flaticon.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn-uicons.flaticon.com" />

    <!--
      Structured data (JSON-LD). Two graphs:
        • Person — describes the human behind the site for Google's
          knowledge panel + rich results.
        • WebSite — declares the canonical site identity + sitelinks
          search box surface (search action is intentional even when no
          internal search exists, because Google ignores it gracefully).
      Update sameAs URLs as social accounts come online.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://kamui.me/#person",
            "name": "Yashwanthkumar Arivazhagan",
            "alternateName": ["Yashwanth", "Kamui"],
            "url": "https://kamui.me/",
            "jobTitle": "Full-Stack Engineer & AI Scientist",
            "image": "https://kamui.me/og-cover.jpg",
            "knowsAbout": [
              "Full-stack engineering",
              "Artificial intelligence",
              "Angular",
              "Three.js",
              "WebGL",
              "GSAP",
              "Motion design",
              "Creative development"
            ],
            "sameAs": [
              "https://instagram.com/_yash_itaxxci"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://kamui.me/#website",
            "url": "https://kamui.me/",
            "name": "Kamui.Me",
            "description": "Portfolio of Yashwanthkumar — full-stack engineer and AI scientist.",
            "inLanguage": "en",
            "publisher": { "@id": "https://kamui.me/#person" },
            "author": { "@id": "https://kamui.me/#person" }
          }
        ]
      }
    </script>

    <!--
      Vendor scripts: defer so they don't block parsing of the Angular bundle.
      gradient.js is bundled via angular.json `scripts` and injected
      automatically — do not duplicate it here.
    -->
    <script src="assets/js/lenis.min.js" defer></script>
    <script src="assets/js/lenis.init.js" defer></script>
